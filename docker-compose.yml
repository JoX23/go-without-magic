version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8080:8080"
      - "9090:9090"
    environment:
      APP_SERVICE_NAME: "go-without-magic"
      APP_SERVICE_VERSION: "1.4.0"
      APP_SERVICE_ENVIRONMENT: "development"
      APP_SERVER_HTTP_PORT: "8080"
      APP_SERVER_GRPC_PORT: "9090"
      APP_DATABASE_DSN: "postgres://app:secret@postgres:5432/app_db"
      APP_OBSERVABILITY_LOG_LEVEL: "info"
      APP_OBSERVABILITY_TRACING_ENABLED: "true"
      APP_OBSERVABILITY_TRACING_SERVICE_NAME: "go-without-magic"
      APP_OBSERVABILITY_TRACING_SERVICE_VERSION: "1.4.0"
      APP_OBSERVABILITY_METRICS_ENABLED: "true"
      APP_OBSERVABILITY_METRICS_PATH: "/metrics"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: app_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployments/docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app_db"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
